name: Generate Editorial Reports

# Kim's Workflow: Upload DOCX to uploads/ folder, then click "Run workflow"
# Reports will appear in the reports/ folder

on:
  workflow_dispatch:
    inputs:
      source_folder:
        description: 'Which folder to process'
        required: true
        default: 'uploads'
        type: choice
        options:
          - uploads
          - test-courses
          - both
      report_format:
        description: 'Report format (inline-diff shows full doc with changes marked)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - inline-diff
          - standard
      use_ai:
        description: 'Enable AI-powered suggestions (requires API key)'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Show detailed processing logs'
        required: false
        default: false
        type: boolean

jobs:
  generate-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          echo "Pandoc version: $(pandoc --version | head -1)"

      - name: Install Python dependencies
        run: |
          pip install requests pyyaml

      - name: Check for DOCX files
        id: check_files
        run: |
          uploads_count=$(find uploads/ -name "*.docx" -type f 2>/dev/null | wc -l)
          test_count=$(find test-courses/ -name "*.docx" -type f 2>/dev/null | wc -l)

          echo "uploads_count=$uploads_count" >> $GITHUB_OUTPUT
          echo "test_count=$test_count" >> $GITHUB_OUTPUT

          echo "Files in uploads/: $uploads_count"
          echo "Files in test-courses/: $test_count"

          if [ "${{ inputs.source_folder }}" = "uploads" ] && [ "$uploads_count" -eq 0 ]; then
            echo "::warning::No DOCX files found in uploads/ folder"
          fi

      - name: Process courses
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd tools

          # Set flags based on inputs
          AI_FLAG=""
          VERBOSE_FLAG=""
          if [ "${{ inputs.use_ai }}" = "false" ]; then
            AI_FLAG="--no-ai"
          fi
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose --progress"
          fi

          process_folder() {
            folder=$1
            echo "========================================="
            echo "Processing folder: $folder"
            echo "========================================="

            for docx in ../$folder/*.docx; do
              if [ -f "$docx" ]; then
                filename=$(basename "$docx" .docx)
                echo ""
                echo "Processing: $filename"
                echo "-----------------------------------------"

                # Generate reports based on format selection
                case "${{ inputs.report_format }}" in
                  "inline-diff")
                    python3 course_editor.py "$docx" --inline-diff --output "../reports/${filename}-inline-diff.md" $AI_FLAG $VERBOSE_FLAG || echo "Warning: Failed to process $filename"
                    echo "Report saved: reports/${filename}-inline-diff.md"
                    ;;
                  "standard")
                    python3 course_editor.py "$docx" --output "../reports/${filename}-report.md" $AI_FLAG $VERBOSE_FLAG || echo "Warning: Failed to process $filename"
                    echo "Report saved: reports/${filename}-report.md"
                    ;;
                  "both")
                    python3 course_editor.py "$docx" --output "../reports/${filename}-report.md" $AI_FLAG $VERBOSE_FLAG || echo "Warning: Failed to process $filename (standard)"
                    echo "Report saved: reports/${filename}-report.md"
                    python3 course_editor.py "$docx" --inline-diff --output "../reports/${filename}-inline-diff.md" $AI_FLAG $VERBOSE_FLAG || echo "Warning: Failed to process $filename (inline-diff)"
                    echo "Report saved: reports/${filename}-inline-diff.md"
                    ;;
                esac
              fi
            done
          }

          # Process based on selection
          case "${{ inputs.source_folder }}" in
            "uploads")
              process_folder "uploads"
              ;;
            "test-courses")
              process_folder "test-courses"
              ;;
            "both")
              process_folder "uploads"
              process_folder "test-courses"
              ;;
          esac

          echo ""
          echo "========================================="
          echo "Processing complete!"
          echo "========================================="

      - name: List generated reports
        run: |
          echo "Reports in reports/ folder:"
          ls -la reports/*.md 2>/dev/null || echo "No reports found"

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update editorial reports - Source: ${{ inputs.source_folder }}, AI: ${{ inputs.use_ai }}, Run by: ${{ github.actor }}"
            # Pull any changes that happened during processing, then push
            git pull --rebase
            git push
            echo "Reports committed and pushed!"
          fi

      - name: Summary
        run: |
          echo "## Editorial Review Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source folder**: ${{ inputs.source_folder }}" >> $GITHUB_STEP_SUMMARY
          echo "**Report format**: ${{ inputs.report_format }}" >> $GITHUB_STEP_SUMMARY
          echo "**AI enabled**: ${{ inputs.use_ai }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Reports" >> $GITHUB_STEP_SUMMARY
          for report in reports/*.md; do
            if [ -f "$report" ]; then
              filename=$(basename "$report")
              echo "- [$filename](reports/$filename)" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Report Formats" >> $GITHUB_STEP_SUMMARY
          echo "- **-report.md**: Table format with line numbers and context preview" >> $GITHUB_STEP_SUMMARY
          echo "- **-inline-diff.md**: Full document with changes marked: ~~deleted~~ **added**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to Find Text in Your Word Doc" >> $GITHUB_STEP_SUMMARY
          echo "1. Open the inline-diff report" >> $GITHUB_STEP_SUMMARY
          echo "2. Search for \`~~\` to find all suggested deletions" >> $GITHUB_STEP_SUMMARY
          echo "3. Copy the surrounding text and Ctrl+F in your Word document" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Click a report link above to view results" >> $GITHUB_STEP_SUMMARY
          echo "2. Delete processed files from uploads/ when done" >> $GITHUB_STEP_SUMMARY

