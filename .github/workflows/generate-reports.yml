name: Generate Editorial Reports

on:
  workflow_dispatch:
    inputs:
      use_ai:
        description: 'Enable AI-powered suggestions'
        required: true
        default: 'true'
        type: boolean

jobs:
  generate-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python dependencies
        run: |
          pip install requests pyyaml

      - name: Process all courses
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd tools

          # Set AI flag based on input
          AI_FLAG=""
          if [ "${{ inputs.use_ai }}" != "true" ]; then
            AI_FLAG="--no-ai"
          fi

          # Process each DOCX file
          for docx in ../test-courses/*.docx; do
            if [ -f "$docx" ]; then
              filename=$(basename "$docx" .docx)
              echo "Processing: $filename"
              python3 course_editor.py "$docx" --output "../reports/${filename}-report.md" $AI_FLAG
            fi
          done

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update editorial reports

            AI Enhancement: ${{ inputs.use_ai }}
            Generated by GitHub Actions"
            git push
          fi
