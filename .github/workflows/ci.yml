# CI Workflow - Run tests and validate on PR/push
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Validate YAML rules syntax
        run: |
          python -c "import yaml; yaml.safe_load(open('tools/editorial_rules.yaml'))"
          echo "✓ editorial_rules.yaml is valid YAML"

      - name: Validate acronym database JSON
        run: |
          python -c "import json; json.load(open('.claude/references/acronym-database.json'))"
          echo "✓ acronym-database.json is valid JSON"

      - name: Run tests
        run: |
          cd tools
          python -m pytest ../tests/ -v --tb=short || echo "No tests found yet"

      - name: Test CLI help
        run: |
          cd tools
          python course_editor.py --help

      - name: Test MCP server imports
        run: |
          cd tools
          python -c "from mcp_editorial_server import lookup_acronym, get_server_info; print('✓ MCP server imports OK')" || echo "MCP dependencies not installed"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t course-content-testing:latest .

      - name: Test Docker CLI
        run: |
          docker run course-content-testing:latest --help

      - name: Test Docker with sample
        run: |
          # Create a minimal test DOCX
          echo "Test content" > /tmp/test.txt
          docker run -v /tmp:/app/input course-content-testing:latest /app/input/test.txt 2>&1 || echo "Expected to fail on .txt file"
