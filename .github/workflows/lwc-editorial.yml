# LWC Editorial Reusable Workflow
# Provides AI copy editing and structure linting for LWC module repositories.
#
# Usage from module repos:
#   jobs:
#     editorial:
#       uses: CiscoLearning/course-content-testing/.github/workflows/lwc-editorial.yml@main

name: LWC Editorial Review

on:
  workflow_call:
    inputs:
      content_path:
        description: 'Path to Content/ directory relative to repo root'
        required: false
        default: 'Content'
        type: string
      report_format:
        description: 'Output format: markdown, json, pr-comment'
        required: false
        default: 'pr-comment'
        type: string
      skip_linting:
        description: 'Skip structure linting (editorial only)'
        required: false
        default: false
        type: boolean
      enable_jira:
        description: 'Enable Jira ticket updates'
        required: false
        default: false
        type: boolean
    secrets:
      JIRA_EMAIL:
        description: 'Jira service account email'
        required: false
      JIRA_API_TOKEN:
        description: 'Jira API token'
        required: false
    outputs:
      issues_found:
        description: 'Total number of editorial issues found'
        value: ${{ jobs.editorial-review.outputs.issues_found }}
      auto_fixed:
        description: 'Number of auto-fixed issues'
        value: ${{ jobs.editorial-review.outputs.auto_fixed }}
      needs_review:
        description: 'Number of issues needing human review'
        value: ${{ jobs.editorial-review.outputs.needs_review }}
      linting_passed:
        description: 'Whether structure linting passed'
        value: ${{ jobs.editorial-review.outputs.linting_passed }}

jobs:
  editorial-review:
    name: Editorial Review
    runs-on: ubuntu-latest
    outputs:
      issues_found: ${{ steps.editorial.outputs.issues_found }}
      auto_fixed: ${{ steps.editorial.outputs.auto_fixed }}
      needs_review: ${{ steps.editorial.outputs.needs_review }}
      linting_passed: ${{ steps.linting.outputs.passed }}

    steps:
      - name: Checkout module repository
        uses: actions/checkout@v4

      - name: Checkout editorial tools
        uses: actions/checkout@v4
        with:
          repository: CiscoLearning/course-content-testing
          path: .editorial-tools
          sparse-checkout: |
            tools/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Run structure linting
        id: linting
        if: ${{ inputs.skip_linting == false }}
        run: |
          python .editorial-tools/tools/lwc_linter.py \
            --content-path "${{ inputs.content_path }}" \
            --output linting-results.json

          # Set output based on results
          if [ -f linting-results.json ]; then
            passed=$(python -c "import json; print(json.load(open('linting-results.json')).get('passed', True))")
            echo "passed=$passed" >> $GITHUB_OUTPUT
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Report linting failure
        if: ${{ steps.linting.outputs.passed == 'False' }}
        run: |
          echo "::error::Module structure validation failed"
          cat linting-results.json
          # Continue to post PR comment with errors

      - name: Run editorial validation
        id: editorial
        run: |
          python .editorial-tools/tools/lwc_editorial.py \
            --content-path "${{ inputs.content_path }}" \
            --format json \
            --output editorial-results.json \
            --verbose

          # Extract metrics for outputs
          if [ -f editorial-results.json ]; then
            issues=$(python -c "import json; print(json.load(open('editorial-results.json')).get('total_issues', 0))")
            fixed=$(python -c "import json; print(json.load(open('editorial-results.json')).get('auto_fixed', 0))")
            review=$(python -c "import json; print(json.load(open('editorial-results.json')).get('needs_review', 0))")

            echo "issues_found=$issues" >> $GITHUB_OUTPUT
            echo "auto_fixed=$fixed" >> $GITHUB_OUTPUT
            echo "needs_review=$review" >> $GITHUB_OUTPUT
          else
            echo "issues_found=0" >> $GITHUB_OUTPUT
            echo "auto_fixed=0" >> $GITHUB_OUTPUT
            echo "needs_review=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate PR comment
        id: comment
        run: |
          # Generate markdown comment combining linting and editorial results
          python .editorial-tools/tools/lwc_editorial.py \
            --content-path "${{ inputs.content_path }}" \
            --format pr-comment \
            --linting linting-results.json \
            --repo-url "${{ github.server_url }}/${{ github.repository }}" \
            --branch "${{ github.head_ref }}" \
            --output comment.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read the generated comment
            let comment = '';
            if (fs.existsSync('comment.md')) {
              comment = fs.readFileSync('comment.md', 'utf8');
            } else {
              comment = '## Editorial Review Results\n\nNo issues found.';
            }

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('## Editorial Review Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing PR comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
              console.log('Created new PR comment');
            }

      - name: Update Jira ticket
        if: ${{ inputs.enable_jira == true && github.event_name == 'pull_request' }}
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          # Only run if Jira credentials are configured
          if [ -n "$JIRA_EMAIL" ] && [ -n "$JIRA_API_TOKEN" ]; then
            python .editorial-tools/tools/lwc_jira.py update-from-pr \
              --pr-url "${{ github.event.pull_request.html_url }}" \
              --branch-name "${{ github.head_ref }}" \
              --pr-title "${{ github.event.pull_request.title }}" \
              --linting-passed "${{ steps.linting.outputs.passed }}" \
              --issues-count "${{ steps.editorial.outputs.needs_review }}" || true
          else
            echo "Jira credentials not configured, skipping update"
          fi

      - name: Fail if linting errors
        if: ${{ steps.linting.outputs.passed == 'False' }}
        run: exit 1
